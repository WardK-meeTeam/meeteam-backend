services:
    meeteam-blue:
        image: 079892728769.dkr.ecr.ap-northeast-2.amazonaws.com/meeteam-server:latest
        container_name: meeteam-blue
        ports:
            - "8080:8080"
        env_file:
            - .env
        environment:
            - SPRING_PROFILES_ACTIVE=prod
        depends_on:
            redis:
                condition: service_healthy
        volumes:
            - ./files:/app/files
        networks:
            - meeteam-network
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 40s
        restart: unless-stopped

    meeteam-green:
        image: 079892728769.dkr.ecr.ap-northeast-2.amazonaws.com/meeteam-server:latest
        container_name: meeteam-green
        ports:
            - "8081:8080"
        env_file:
            - .env
        environment:
            - SPRING_PROFILES_ACTIVE=prod
        depends_on:
            redis:
                condition: service_healthy
        volumes:
            - ./files:/app/files
        networks:
            - meeteam-network
        healthcheck:
            test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 40s
        restart: unless-stopped

    redis:
        image: redis:7
        container_name: redis
        command: ["redis-server", "--appendonly", "yes"]
        ports:
            - "6379:6379"
        volumes:
            - ./redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            retries: 20
        networks:
            - meeteam-network
        restart: always

    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        ports:
            - "9090:9090"
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
        networks:
            - meeteam-network

    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        ports:
            - "3000:3000"
        depends_on:
            - prometheus
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
        volumes:
            - grafana-storage:/var/lib/grafana
        networks:
            - meeteam-network

volumes:
    grafana-storage:
    redis_data:

networks:
    meeteam-network:
        driver: bridge
spring:
    datasource:
        url: ${DATASOURCE_URL}
        username: ${DATASOURCE_USERNAME}
        password: ${DATASOURCE_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
            # t3.micro 메모리 절약: 커넥션 풀 작게 유지
            minimum-idle: 2
            maximum-pool-size: 10

    # 테스트 DB는 비어있는 컨테이너 MySQL이라 Flyway(삭제/정리 전용 스크립트)로는
    # 스키마를 만들 수 없음 → Flyway 끄고 Hibernate가 엔티티 기준으로 스키마 생성.
    # (주의: 이 테스트 환경은 Flyway 마이그레이션 자체를 검증하지는 않음)
    flyway:
        enabled: false

    jpa:
        hibernate:
            ddl-auto: create  # 매 기동 시 엔티티 기준으로 스키마 새로 생성 (테스트 DB는 초기화돼도 무방)
        show-sql: true
        defer-datasource-initialization: true  # 테이블 생성 후 시드 데이터 주입
        properties:
            hibernate:
                format_sql: true
                default_batch_fetch_size: 500
        open-in-view: false
    sql:
        init:
            mode: always  # job-seed.sql 로 직군/직무/기술스택 기본 데이터 주입
            data-locations: classpath:db/seed/job-seed.sql
    data:
        redis:
            host: redis    # compose-test.yml 의 redis 서비스명
            port: 6379


jwt:
    secret-key: ${JWT_SECRET_KEY}
    access-exp-time: ${JWT_ACCESS_EXP_TIME:36000000}                # 액세스 토큰 만료 시간
    refresh-exp-time: ${JWT_REFRESH_EXP_TIME:604800000}             # 리프레시 토큰 만료 시간


# AWS S3 설정
cloud:
    aws:
        credentials:
            access-key: ${AWS_ACCESS_KEY_ID}
            secret-key: ${AWS_SECRET_ACCESS_KEY}
        s3:
            bucket: ${S3_BUCKET:meeteam-test-bucket}
        region:
            static: ${AWS_REGION:ap-northeast-2}
        stack:
            auto: false

# 파일 업로드 설정
file:
    dir: ${FILE_UPLOAD_DIR:/home/ubuntu/meeteam/upload}
    upload:
        max-size: 10MB
        allowed-extensions: jpg,jpeg,png,gif,webp
        s3:
            base-url: https://${cloud.aws.s3.bucket}.s3.${cloud.aws.region.static}.amazonaws.com



springdoc:
    swagger-ui:
        path: /swagger-ui.html
    api-docs:
        path: /v3/api-docs

server:
    servlet:
        context-path: /
    tomcat:
        mbeanregistry:
            enabled: true
    forward-headers-strategy: framework


management:
    endpoints:
        web:
            exposure:
                include:
                    - "*"
    endpoint:
        health:
            show-components: always

app:
    warmup:
        enabled: true
    # 테스트 서버는 기본적으로 HTTP 직접 접속(http://<EC2_IP>:8080)을 가정합니다.
    # → 쿠키 도메인은 비우고(host-only), secure=false / SameSite=Lax 로 둬야 로그인 쿠키가 정상 동작합니다.
    # 만약 테스트용 HTTPS 도메인(예: test.meeteam.alom-sejong.com)을 앞단에 붙이면
    # domain / secure=true / same-site=None 으로 변경하세요.
    cookie:
        domain: ${COOKIE_DOMAIN:}
        secure: ${COOKIE_SECURE:false}
        same-site: ${COOKIE_SAME_SITE:Lax}

# CORS 설정 (테스트 프론트/로컬 개발용)
cors:
    allowed-origins:
        - https://meeteam-front-test.vercel.app
        - https://*.vercel.app
        - http://localhost:3000
        - http://localhost:3001
        - https://localhost:3000
    allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
    allowed-headers:
        - "*"
    exposed-headers:
        - Authorization
        - Set-Cookie
        - X-Total-Count
    allow-credentials: true
    max-age: 3600
